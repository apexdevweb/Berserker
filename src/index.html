<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="assets/CSS/style.css" />
  <title>BERSERKER</title>
</head>

<body>
  <header>
    <img src="assets/image/berserkerLogo.png" alt="Logo" class="header__logo">
    <hgroup class="title__ctnr">
      <h1 class="first__title">Berserker</h1>
      <hr class="title__separate">
      <h2 class="second__title">Gate crasher</h2>
    </hgroup>
    <ul class="info__capacity--ctnr">
      <li class="info__capacity--el"><em>Exploit Memory</em></li>
      <li class="info__capacity--el"><em>By pass sécurity</em></li>
      <li class="info__capacity--el"><em>Injector</em></li>
      <li class="info__capacity--el"><em>Encryptor</em></li>
    </ul>
    <p class="signature">By Script'Enjøyer 2026</p>
  </header>
  <section class="exploit__memory--content">
    <h2 class="section__title">Exploit Memory</h2>
    <div class="exploit__wrapper">
      <ul class="option__ctnr">
        <li class="option__el">
          <h2 class="option__title">View process</h2>
          <div class="option__wrapper">
            <div class="option__btn--ctnr">
              <button class="btn-primary" onclick="chargerProcessus()">Scan process</button>
              <button class="btn-primary" onclick="arreterScan()">Stop</button>
            </div>
            <div class="process__data--ctnr">
              <div id="liste-proc" class="process__list--ctnr"></div>
              <hr class="process__separate">
              <div class="process__data--subctnr">
                <h3 class="target__title">Selected Target</h3>
                <div id="target-display" class="target__display">Target: None</div>
              </div>
            </div>
          </div>
        </li>
        <li class="option__el">
          <h2 class="option__title">Memory scan</h2>
          <div class="option__wrapper">
            <div class="btn__scan--ctnr">
              <input type="number" id="valeur-scan" class="entry__value" placeholder="Valeur (ex: 100)">
              <button class="btn-primary" onclick="lancerPremierScan()">First Scan</button>
              <button class="btn-primary" onclick="lancerNextScan()">Next Scan</button>
            </div>
            <div class="barre__progress--ctnr">
              <progress id="scan-bar" value="0" max="100"></progress><span id="progress-meter"
                class="prog__meter"></span>
            </div>
            <div id="res-scan" class="scann__result--ctnr"></div>
            <button class="ai__btn" id="ai-analyzer" onclick="analyserResultatsNextScan()">Analyze by A.I</button>
        </li>
      </ul>
    </div>
  </section>
  <section class="ia__content">
    <div class="chat__ai__ctnr">
      <div id="chat" class="chat__ia__response"></div>
      <hr class="ia__separate">
      <div id="input-area" class="input__groupe">
        <input type="text" id="msg-input" placeholder="Berserker A.I" class="prompt__msg" />
        <button onclick="envoyer()" class="aiBtn"><img src="assets/image/berserkerLogo.png" alt="Logo"class="btnLogo"></button>
        <button onclick="cleanChat()" class="clean-btn" title="Purge Terminal">PURGE</button>
      </div>
    </div>
  </section>
  <section class="injector__content">
    <h2 class="section__title">Injector</h2>
    <div class="injector__wrapper">
      <input type="text" id="dll-path" class="injector__input" placeholder="paths to the file...">
      <button class="btn-primary" onclick="choisirEtInjecter()">Inject Now</button>
    </div>
    <div id="res-inject"></div>
  </section>
  <script src="assets/JS/main.js"></script>
  <script src="assets/JS/processCharger.js"></script>
  <script src="assets/JS/memoryScan.js"></script>
  <script src="assets/JS/firstScan.js"></script>
  <script src="assets/JS/nextScan.js"></script>
  <script src="assets/JS/valueModifier.js"></script>
  <script src="assets/JS/cleanChat.js"></script>
  <script src="assets/JS/refreshia.js"></script>
  <script src="assets/JS/injector.js"></script>
</body>

</html>
